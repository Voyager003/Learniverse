services:
  app:
    image: ghcr.io/${GHCR_OWNER:-voyager003}/learniverse:${IMAGE_TAG:-latest}
    env_file:
      - ./.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - internal
      - edge
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/v1/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    env_file:
      - ./.env.prod
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: >
      /bin/sh -c "
      if [ -f /etc/letsencrypt/live/$${API_DOMAIN}/fullchain.pem ] && [ -f /etc/letsencrypt/live/$${API_DOMAIN}/privkey.pem ]; then
        TEMPLATE=/etc/nginx/templates/api-https.conf.template;
      else
        TEMPLATE=/etc/nginx/templates/api-http.conf.template;
      fi;
      sed \"s/__API_DOMAIN__/$${API_DOMAIN}/g\" \"$$TEMPLATE\" > /etc/nginx/conf.d/default.conf;
      exec nginx -g 'daemon off;'"
    networks:
      - edge
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    env_file:
      - ./.env.prod
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - edge

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  mongo_data:

networks:
  internal:
    internal: true
  edge:
